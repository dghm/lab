<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 專案總覽</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f4f5f7;
    color: #1d1f23;
    margin: 0;
    padding: 3rem 1.5rem;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 0.5rem;
  }
  p.subtitle {
    color: #666;
    margin-top: 0;
    margin-bottom: 2rem;
  }
  .project-list {
    display: grid;
    gap: 1rem;
  }
  .project-card {
    display: block;
    background: #fff;
    border: 1px solid #e2e4e9;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .project-card:hover {
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transform: translateY(-1px);
  }
  .project-card h2 {
    margin: 0 0 0.35rem;
    font-size: 1.1rem;
  }
  .project-card p {
    margin: 0;
    color: #555;
    font-size: 0.92rem;
  }
  .badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    background: #eef2ff;
    color: #3b4fd9;
    margin-left: 0.5rem;
  }
</style>
</head>
<body>
<main>
  <h1>Lab 專案總覽</h1>
  <p class="subtitle">點選下方卡片進入各個專案</p>
  <div class="project-list">
    <a class="project-card" href="https://YOUR-COURT-RESERVATION-SITE.netlify.app" target="_blank" rel="noopener">
      <h2>球場預約系統<span class="badge">運行中</span></h2>
      <p>管理場地預約、會員與場主後台</p>
    </a>
  </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f1ea">
  <meta name="robots" content="noindex, nofollow">
  <title>DGHM 電子賀卡 Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="DGHM 電子賀卡 Dashboard 首頁">
      <span class="brand-mark">DGHM</span>
      <span class="brand-name">電子賀卡平台</span>
    </a>
    <span class="environment-label">內部管理</span>
  </header>

  <main>
    <section class="page-heading" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">Greeting Cards</p>
        <h1 id="page-title">賀卡管理</h1>
        <p class="intro">從左側選擇賀卡，在右側確認桌機與手機呈現效果。</p>
      </div>
      <div class="summary" aria-label="賀卡統計">
        <div><strong id="card-count">—</strong><span>全部賀卡</span></div>
        <div><strong id="published-count">—</strong><span>已發布</span></div>
      </div>
    </section>

    <div class="workspace">
      <section class="catalog-panel" aria-labelledby="catalog-title">
        <div class="panel-heading">
          <div>
            <p class="section-label">Card catalog</p>
            <h2 id="catalog-title">賀卡清單</h2>
          </div>
          <p id="catalog-status" class="catalog-status" role="status">正在讀取…</p>
        </div>
        <div id="card-list" class="card-list" aria-live="polite"></div>
      </section>

      <section class="preview-panel" aria-labelledby="preview-title">
        <div class="preview-heading">
          <div>
            <p class="section-label">Live preview</p>
            <h2 id="preview-title">選擇一張賀卡</h2>
          </div>
          <div class="device-switch" aria-label="預覽裝置">
            <button type="button" class="device-button is-active" data-device="desktop" aria-pressed="true">桌機</button>
            <button type="button" class="device-button" data-device="mobile" aria-pressed="false">手機</button>
          </div>
        </div>

        <div id="preview-stage" class="preview-stage is-empty">
          <div class="preview-placeholder">
            <strong>尚未選擇賀卡</strong>
            <span>從左側清單選擇一張賀卡開始預覽。</span>
          </div>
          <div class="device-frame" hidden>
            <div class="device-browser-bar" aria-hidden="true">
              <i></i><i></i><i></i>
              <span id="preview-address"></span>
            </div>
            <iframe id="card-preview" title="賀卡預覽"></iframe>
          </div>
        </div>

        <div class="preview-footer">
          <div>
            <span id="preview-state" class="preview-state">尚未選擇</span>
            <span id="preview-url" class="preview-url"></span>
          </div>
          <a id="open-full-card" class="text-link" href="#" target="_blank" rel="noopener" hidden>另開完整頁面 ↗</a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <span>萬能數維有限公司</span>
    <span>DGHM Greeting Cards</span>
  </footer>

  <template id="card-template">
    <article class="card-item">
      <button type="button" class="card-select">
        <span class="thumbnail-wrap">
          <img class="card-thumbnail" alt="" loading="lazy">
        </span>
        <span class="card-summary">
          <span class="card-topline">
            <span class="status-badge"></span>
            <span class="card-id"></span>
          </span>
          <span class="festival-label"></span>
          <strong class="card-title"></strong>
          <span class="card-message"></span>
          <span class="card-meta">
            <span><small>正式路徑</small><code class="canonical-path"></code></span>
            <span><small>短碼</small><code class="short-code"></code></span>
          </span>
          <span class="card-bottomline">
            <span class="preview-action">在右側預覽</span>
            <span class="publish-note"></span>
          </span>
        </span>
      </button>
    </article>
  </template>

  <script src="dashboard.js" defer></script>
</body>
</html>

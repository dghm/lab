name: Deploy Taiwan stock tracker to Bluehost

on:
  push:
    branches:
      - main
    paths:
      - "taiwan-stock-tracker/public/**"
      - ".github/workflows/deploy-taiwan-stock-tracker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-taiwan-stock-tracker-bluehost
  cancel-in-progress: false

permissions:
  contents: read

env:
  BLUEHOST_STOCK_PATH: /home1/zjqafhmy/lab.dghm.tw/taiwan-stock-tracker
  BLUEHOST_STOCK_URL: https://lab.dghm.tw/taiwan-stock-tracker/

jobs:
  deploy:
    name: SSH/rsync deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.BLUEHOST_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Validate deployment settings
        env:
          DEPLOY_HOST: ${{ secrets.BLUEHOST_HOST }}
          DEPLOY_PORT: ${{ secrets.BLUEHOST_PORT }}
          DEPLOY_USER: ${{ secrets.BLUEHOST_USERNAME }}
          DEPLOY_PATH: ${{ env.BLUEHOST_STOCK_PATH }}
        run: |
          set -eu
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          case "$DEPLOY_PATH" in
            */taiwan-stock-tracker|*/taiwan-stock-tracker/) ;;
            *) echo "Deployment path must end with /taiwan-stock-tracker" >&2; exit 1 ;;
          esac

      - name: Deploy static application
        env:
          DEPLOY_HOST: ${{ secrets.BLUEHOST_HOST }}
          DEPLOY_PORT: ${{ secrets.BLUEHOST_PORT }}
          DEPLOY_USER: ${{ secrets.BLUEHOST_USERNAME }}
          DEPLOY_PATH: ${{ env.BLUEHOST_STOCK_PATH }}
        run: |
          set -eu
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "install -d '$DEPLOY_PATH'"
          RSYNC_SSH="ssh -p $DEPLOY_PORT"
          rsync -az --checksum --itemize-changes -e "$RSYNC_SSH" \
            taiwan-stock-tracker/public/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Verify deployment
        env:
          DEPLOY_URL: ${{ env.BLUEHOST_STOCK_URL }}
        run: |
          set -eu
          status=$(curl --silent --show-error --location --retry 3 \
            --output /dev/null --write-out '%{http_code}' "$DEPLOY_URL")
          case "$status" in
            200) echo "Taiwan stock tracker is publicly reachable at $DEPLOY_URL" ;;
            401) echo "Taiwan stock tracker is reachable and password protected at $DEPLOY_URL" ;;
            *) echo "Taiwan stock tracker returned HTTP $status" >&2; exit 1 ;;
          esac

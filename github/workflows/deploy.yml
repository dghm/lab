name: Deploy myinvestment to Bluehost

on:
  push:
    branches:
      - claude/amazing-davinci-d0wypy
    paths:
      - 'myinvestment/**'

jobs:
  ftp-deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./
          local-dir: ./myinvestment/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            myinvestment/config.php
